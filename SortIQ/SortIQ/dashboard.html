<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waste Detector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c10;
    --surface:  #111318;
    --border:   #1e2230;
    --text:     #e8eaf0;
    --muted:    #5a6278;
    --logam:    #ffb832;
    --tekstil:  #ff5ab4;
    --organik:  #3cca50;
    --accent:   #00f5c4;
    --danger:   #ff4d6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--muted); }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 999px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--organik);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  /* ── GRID ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto 1fr;
    gap: 20px;
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── FEED ── */
  .feed-card {
    grid-column: 1;
    grid-row: 1 / 3;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .feed-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .feed-header h2 {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .fps-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    background: rgba(0,245,196,0.08);
    border: 1px solid rgba(0,245,196,0.2);
    padding: 3px 10px;
    border-radius: 6px;
  }
  .feed-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    min-height: 440px;
    position: relative;
  }
  #video-stream {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .feed-offline {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
  }
  .feed-offline svg { opacity: 0.3; }

  /* ── STAT CARDS ── */
  .stats-row {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .stat-card.logam::before   { background: var(--logam); }
  .stat-card.tekstil::before { background: var(--tekstil); }
  .stat-card.organik::before { background: var(--organik); }

  .stat-label {
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stat-card.logam   .stat-label { color: var(--logam); }
  .stat-card.tekstil .stat-label { color: var(--tekstil); }
  .stat-card.organik .stat-label { color: var(--organik); }

  .stat-count {
    font-family: 'Space Mono', monospace;
    font-size: 2.4rem;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
    transition: all 0.3s;
  }
  .stat-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .stat-bar {
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    margin-top: 12px;
    overflow: hidden;
  }
  .stat-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
    width: 0%;
  }
  .stat-card.logam   .stat-fill { background: var(--logam); }
  .stat-card.tekstil .stat-fill { background: var(--tekstil); }
  .stat-card.organik .stat-fill { background: var(--organik); }

  /* ── LOG ── */
  .log-card {
    grid-column: 2;
    grid-row: 2;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-height: 380px;
  }
  .log-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .log-header h3 {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .btn-reset {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--danger);
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.25);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 1px;
  }
  .btn-reset:hover { background: rgba(255,77,109,0.18); }

  .log-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .log-item {
    display: grid;
    grid-template-columns: 26px 1fr auto auto;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    font-size: 0.78rem;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .log-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    justify-self: center;
  }
  .log-name { color: var(--text); font-weight: 600; }
  .log-conf { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.68rem; }
  .log-time { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.65rem; }
  .log-empty {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 0.78rem;
    font-family: 'Space Mono', monospace;
  }

  /* ── CURRENTLY DETECTED ── */
  .current-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .det-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 600;
    border: 1px solid;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .det-chip.logam   { color: var(--logam);   background: rgba(255,184,50,0.1);  border-color: rgba(255,184,50,0.3); }
  .det-chip.tekstil { color: var(--tekstil); background: rgba(255,90,180,0.1); border-color: rgba(255,90,180,0.3); }
  .det-chip.organik { color: var(--organik); background: rgba(60,202,80,0.1);  border-color: rgba(60,202,80,0.3); }
  .det-chip.other   { color: var(--muted);   background: rgba(90,98,120,0.1);  border-color: rgba(90,98,120,0.3); }

  .now-card {
    grid-column: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 0;
    position: relative;
  }
  .now-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
    min-width: 80px;
  }

  @media (max-width: 900px) {
    .main-grid {
      grid-template-columns: 1fr;
      padding: 16px;
    }
    .feed-card, .stats-row, .log-card { grid-column: 1; grid-row: auto; }
    .stats-row { flex-direction: row; }
    .stat-card { flex: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Waste<span>//</span>Detect</div>
  <div class="status-pill">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Menghubungkan...</span>
  </div>
</header>

<div class="main-grid">

  <!-- Feed -->
  <div class="feed-card">
    <div class="feed-header">
      <h2>📷 Live Feed</h2>
      <span class="fps-badge" id="fps-badge">-- FPS</span>
    </div>
    <div class="feed-body">
      <img id="video-stream" src="/video_feed" alt="stream"
           onerror="this.style.display='none'; document.getElementById('offline-msg').style.display='flex'">
      <div class="feed-offline" id="offline-msg" style="display:none">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <line x1="2" y1="2" x2="22" y2="22"/>
        </svg>
        <span>Kamera tidak tersedia</span>
        <span style="font-size:0.65rem">Pastikan waste_detector.py sudah berjalan</span>
      </div>
    </div>
  </div>

  <!-- Stat cards -->
  <div class="stats-row">
    <div class="stat-card logam">
      <div class="stat-label">⚙ Logam</div>
      <div class="stat-count" id="cnt-logam">0</div>
      <div class="stat-sub">total terdeteksi</div>
      <div class="stat-bar"><div class="stat-fill" id="bar-logam"></div></div>
    </div>
    <div class="stat-card tekstil">
      <div class="stat-label">🧵 Tekstil</div>
      <div class="stat-count" id="cnt-tekstil">0</div>
      <div class="stat-sub">total terdeteksi</div>
      <div class="stat-bar"><div class="stat-fill" id="bar-tekstil"></div></div>
    </div>
    <div class="stat-card organik">
      <div class="stat-label">🌿 Organik</div>
      <div class="stat-count" id="cnt-organik">0</div>
      <div class="stat-sub">total terdeteksi</div>
      <div class="stat-bar"><div class="stat-fill" id="bar-organik"></div></div>
    </div>
  </div>

  <!-- Log -->
  <div class="log-card">
    <div class="log-header">
      <div style="display:flex;align-items:center;gap:10px">
        <h3>Log Deteksi</h3>
        <div class="now-label" style="min-width:auto">
          — <span id="now-chips-inline"></span>
        </div>
      </div>
      <button class="btn-reset" onclick="resetCounts()">RESET</button>
    </div>
    <div class="log-body" id="log-body">
      <div class="log-empty" id="log-empty">Menunggu deteksi...</div>
    </div>
  </div>

</div>

<script>
const COLOR = { logam:'#ffb832', tekstil:'#ff5ab4', organik:'#3cca50' };
let prevCounts = {};
let connected = false;

function classOf(label) {
  const l = label.toLowerCase();
  if (l.includes('logam')   || l.includes('metal'))  return 'logam';
  if (l.includes('tekstil') || l.includes('fabric') || l.includes('cloth')) return 'tekstil';
  if (l.includes('organik') || l.includes('organic')) return 'organik';
  return 'other';
}

function updateUI(data) {
  // FPS
  document.getElementById('fps-badge').textContent = data.fps + ' FPS';

  // Status
  connected = true;
  document.getElementById('status-dot').style.background = '#3cca50';
  document.getElementById('status-text').textContent = 'Aktif';

  // Counts
  const counts = data.counts || {};
  const total  = Object.values(counts).reduce((a, b) => a + b, 0) || 1;

  ['logam','tekstil','organik'].forEach(k => {
    const v = counts[k] || 0;
    const el = document.getElementById('cnt-' + k);
    if (el && parseInt(el.textContent) !== v) {
      el.textContent = v;
      el.style.transform = 'scale(1.15)';
      setTimeout(() => el.style.transform = 'scale(1)', 200);
    }
    const bar = document.getElementById('bar-' + k);
    if (bar) bar.style.width = Math.round((v / total) * 100) + '%';
  });

  // Now chips — current frame detections
  const chips = document.getElementById('now-chips-inline');
  if (chips) {
    if (data.detections && data.detections.length) {
      chips.innerHTML = data.detections.map(d => {
        const cls = classOf(d.label);
        return `<span class="det-chip ${cls}">${d.label} ${(d.confidence*100).toFixed(0)}%</span>`;
      }).join('');
    } else {
      chips.innerHTML = '<span style="color:var(--muted);font-size:0.72rem;font-family:Space Mono,monospace">tidak ada objek</span>';
    }
  }

  // Log
  const history = data.history || [];
  const logBody = document.getElementById('log-body');
  const logEmpty = document.getElementById('log-empty');

  if (history.length === 0) {
    logEmpty.style.display = 'block';
    return;
  }
  logEmpty.style.display = 'none';

  logBody.innerHTML = history.map(d => {
    const cls = classOf(d.label);
    const col = COLOR[cls] || '#5a6278';
    return `
      <div class="log-item">
        <span class="log-dot" style="background:${col}"></span>
        <span class="log-name">${d.label}</span>
        <span class="log-conf">${(d.confidence*100).toFixed(0)}%</span>
        <span class="log-time">${d.time}</span>
      </div>`;
  }).join('');
}

async function fetchStatus() {
  try {
    const res  = await fetch('/api/status');
    const data = await res.json();
    updateUI(data);
  } catch (e) {
    if (connected) {
      document.getElementById('status-dot').style.background = '#ff4d6d';
      document.getElementById('status-text').textContent = 'Terputus';
      connected = false;
    }
  }
}

async function resetCounts() {
  await fetch('/api/reset', { method: 'POST' });
  ['logam','tekstil','organik'].forEach(k => {
    document.getElementById('cnt-' + k).textContent = '0';
    document.getElementById('bar-' + k).style.width = '0%';
  });
  document.getElementById('log-body').innerHTML =
    '<div class="log-empty">Log direset.</div>';
}

// Poll setiap 300ms
setInterval(fetchStatus, 300);
fetchStatus();
</script>
</body>
</html>
